<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Cardápio Favorito</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap');

        body {
           
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                              url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #332d2d;
        }

       
        .cardapio-container {
            background-color: rgba(255, 255, 255, 0.95); 
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-top: 10px solid #d94328;
            max-width: 450px;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(5px); 
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #d94328;
            font-size: 2.2rem;
            margin-top: 0;
            margin-bottom: 30px;
            border-bottom: 2px solid #f2f2f2;
            padding-bottom: 15px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 15px;
            margin-bottom: 12px;
            background-color: #fff;
            border: 1px solid #eee;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center; 
            font-size: 1.1rem;
            color: #444;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        
        li::before {
            content: "✨";
            margin-right: 10px;
            filter: sepia(1) saturate(5) hue-rotate(-20deg);
        }

        li:hover {
            transform: scale(1.05);
            background-color: #d94328;
            color: white;
            border-color: #d94328;
            box-shadow: 0 8px 15px rgba(217, 67, 40, 0.3);
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #222;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="cardapio-container">
        <h1>Meu cardápio favorito</h1>
        
        <ul>
            <li>Pizza</li>
            <li>Hambúrguer</li>
            <li>Massas</li>
            <li>Chocolate</li>
        </ul>
    </div>

</body>
</html>
